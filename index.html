<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine à Langue</title>
    
    <!-- Lien vers le fichier manifest pour l'installation -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Couleur de la barre d'adresse sur mobile -->
    <meta name="theme-color" content="#000000">
    
    <!-- Icône pour iPhone/Safari -->
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        /* Votre style ici */
        body { font-family: sans-serif; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <h1>Bienvenue sur Machine à Langue</h1>
    <p>Votre application est prête à être installée.</p>

    <!-- Script d'activation de l'application (Service Worker) -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log("Application prête !"))
          .catch(err => console.log("Erreur :", err));
      }
    </script>
</body>
</html>
